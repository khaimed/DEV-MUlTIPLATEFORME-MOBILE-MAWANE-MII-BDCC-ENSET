# Project-wide Gradle settings.
android.useAndroidX=true
android.nonTransitiveRClass=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Prevent file locking issues on Windows
org.gradle.daemon=false
org.gradle.vfs.watch=false
org.gradle.caching=false

# Disabling features known to cause the instrumentation-hierarchy.bin error
android.experimental.privacy.allow-all-instrumentation-analysis=false
android.experimental.self-instrumentation=false
